spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0   
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.application.name=leiloai-api
server.port=${PORT:8081}

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=15
jwt.refresh-token-expiration=1440
jwt.issuer=leiloai-api

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads/auctions}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}